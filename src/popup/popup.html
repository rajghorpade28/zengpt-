<!DOCTYPE html>
<html>
<head>
    <title>ZenGPT Settings</title>
    <style>
        body {
            width: 250px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            padding: 16px;
            color: #333;
            background-color: #f9f9f9;
        }
        h2 {
            font-size: 16px;
            margin: 0 0 12px;
            color: #1a1a1a;
        }
        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #10a37f;
        }
        input:focus + .slider {
            box-shadow: 0 0 1px #10a37f;
        }
        input:checked + .slider:before {
            -webkit-transform: translateX(24px);
            -ms-transform: translateX(24px);
            transform: translateX(24px);
        }
        .desc {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Settings</h2>
    <div class="container">
        <span>Hide Answers</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider"></span>
        </label>
    </div>
    <div class="desc">
        Toggle to automatically hide ChatGPT assistant responses.
    </div>
    <script src="popup.js"></script>
</body>
</html>
